services:
  moriicoffee.database:
    image: postgres:17-alpine
    container_name: moriicoffee.database
    environment:
      POSTGRES_DB: MoriiCoffeeDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: always
    volumes:
      - moriicoffee_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MoriiCoffeeDb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  moriicoffee.minio:
    image: minio/minio:latest
    container_name: moriicoffee.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always
    volumes:
      - moriicoffee_minio_data:/data
      - moriicoffee_minio_config:/root/.minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  moriicoffee.redis:
    image: redis:7-alpine
    container_name: moriicoffee.redis
    ports:
      - "6379:6379"
    volumes:
      - moriicoffee_redis_data:/data
    command: redis-server --appendonly yes
    restart: always

networks:
  default:
    name: moriicoffee_network
    driver: bridge

volumes:
  moriicoffee_postgres_data:
    name: moriicoffee_postgres_data
  moriicoffee_minio_data:
    name: moriicoffee_minio_data
  moriicoffee_minio_config:
    name: moriicoffee_minio_config
  moriicoffee_redis_data:
    name: moriicoffee_redis_data
